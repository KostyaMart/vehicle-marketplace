spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vehicle_marketplace}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ensure SQL data files are executed for external DBs during dev
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# Defer running data.sql until after JPA has created the schema
spring.jpa.defer-datasource-initialization=true

# JWT settings
app.jwtSecret=${JWT_SECRET:ChangeThisSecretForDev}
app.jwtExpirationMs=86400000

